<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-label="poolgrad overview diagram">
  <rect x="0" y="0" width="920" height="260" fill="#fff" />
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="currentColor" />
    </marker>
  </defs>

  <g fill="none" stroke="currentColor" stroke-width="2">
    <rect x="40" y="70" width="190" height="70" rx="10" />
    <rect x="290" y="70" width="190" height="70" rx="10" />
    <rect x="540" y="70" width="190" height="70" rx="10" />
    <rect x="540" y="170" width="190" height="60" rx="10" />

    <line x1="230" y1="105" x2="290" y2="105" marker-end="url(#arrow)" />
    <line x1="480" y1="105" x2="540" y2="105" marker-end="url(#arrow)" />
    <line x1="635" y1="140" x2="635" y2="170" marker-end="url(#arrow)" />
  </g>

  <g fill="currentColor" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace">
    <text x="60" y="45" font-size="24" font-weight="700">poolgrad</text>
    <text x="60" y="62" font-size="14" opacity="0.85">tensor → graph → kernels, with pooled gradient memory</text>

    <text x="70" y="112" font-size="18">tensor</text>
    <text x="320" y="112" font-size="18">graph</text>
    <text x="570" y="112" font-size="18">kernels</text>
    <text x="562" y="206" font-size="18">memory pool</text>

    <text x="290" y="150" font-size="13" opacity="0.85">forward builds nodes</text>
    <text x="290" y="168" font-size="13" opacity="0.85">backward walks in reverse</text>
  </g>
</svg>
